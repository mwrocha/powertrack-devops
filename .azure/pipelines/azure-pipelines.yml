# ============================================================
# PowerTrack - Pipeline CI/CD Azure DevOps
# Etapas: Build → Testes → Deploy Staging → Deploy Produção
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.repo.local=$(Pipeline.Workspace)/.m2'
  IMAGE_NAME: 'powertrack'
  IMAGE_TAG: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

# ============================================================
# STAGE 1 — BUILD & TESTES
# ============================================================
- stage: Build
  displayName: '🔨 Build e Testes'
  jobs:

  - job: BuildAndTest
    displayName: 'Compilar e Testar'
    steps:

    # Cache de dependências Maven
    - task: Cache@2
      displayName: 'Cache Maven (.m2)'
      inputs:
        key: 'maven | "$(Agent.OS)" | pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
          maven
        path: '$(Pipeline.Workspace)/.m2'

    # Configura Java 21
    - task: JavaToolInstaller@0
      displayName: 'Configurar Java 21'
      inputs:
        versionSpec: '21'
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'

    # Compila o projeto
    - task: Maven@4
      displayName: '📦 Maven Build'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package -DskipTests'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: false

    # Executa testes automatizados
    - task: Maven@4
      displayName: '🧪 Executar Testes'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        testRunTitle: 'PowerTrack - Testes Unitários'

    # Publica o JAR como artefato do pipeline
    - task: CopyFiles@2
      displayName: 'Copiar JAR para staging'
      inputs:
        sourceFolder: '$(System.DefaultWorkingDirectory)/target'
        contents: '*.jar'
        targetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      displayName: '📤 Publicar Artefato (JAR)'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'powertrack-jar'

    # Build da imagem Docker
    - task: Docker@2
      displayName: '🐳 Build Docker Image'
      inputs:
        command: 'build'
        Dockerfile: 'Dockerfile'
        tags: |
          $(IMAGE_NAME):$(IMAGE_TAG)
          $(IMAGE_NAME):latest

    # Publica resultado dos testes
    - task: PublishTestResults@2
      displayName: '📊 Publicar Resultados dos Testes'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        failTaskOnFailedTests: true

# ============================================================
# STAGE 2 — DEPLOY STAGING
# ============================================================
- stage: DeployStaging
  displayName: '🚀 Deploy — Staging'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  variables:
    APP_PROFILE: 'staging'
    APP_PORT: '8080'

  jobs:
  - deployment: DeployToStaging
    displayName: 'Deploy para Staging'
    environment: 'powertrack-staging'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # Cria o arquivo .env para staging
          - script: |
              echo "MONGO_USERNAME=$(MONGO_USERNAME)" >> .env
              echo "MONGO_PASSWORD=$(MONGO_PASSWORD)" >> .env
              echo "MONGO_DATABASE=$(MONGO_DATABASE)" >> .env
              echo "APP_PROFILE=staging" >> .env
              echo "APP_PORT=8080" >> .env
            displayName: '⚙️ Gerar .env Staging'

          # Sobe os containers no ambiente staging
          - script: |
              docker-compose -f docker-compose.yml -f docker-compose.staging.yml down --remove-orphans || true
              docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
            displayName: '🐳 Docker Compose Up (Staging)'

          # Aguarda a aplicação ficar saudável
          - script: |
              echo "Aguardando aplicação inicializar..."
              sleep 30
              curl -f http://localhost:8080/actuator/health || exit 1
              echo "✅ Staging está UP!"
            displayName: '❤️ Health Check Staging'

# ============================================================
# STAGE 3 — DEPLOY PRODUÇÃO
# ============================================================
- stage: DeployProducao
  displayName: '🏭 Deploy — Produção'
  dependsOn: DeployStaging
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
    APP_PROFILE: 'production'
    APP_PORT: '80'

  jobs:
  - deployment: DeployToProducao
    displayName: 'Deploy para Produção'
    environment: 'powertrack-producao'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # Aprovação manual já configurada no Environment do Azure DevOps

          # Gera .env de produção (variáveis vêm do Azure DevOps Variable Groups)
          - script: |
              echo "MONGO_USERNAME=$(MONGO_USERNAME_PROD)" >> .env
              echo "MONGO_PASSWORD=$(MONGO_PASSWORD_PROD)" >> .env
              echo "MONGO_DATABASE=$(MONGO_DATABASE_PROD)" >> .env
              echo "APP_PROFILE=production" >> .env
              echo "APP_PORT=80" >> .env
            displayName: '⚙️ Gerar .env Produção'

          # Sobe os containers em produção
          - script: |
              docker-compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans || true
              docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            displayName: '🐳 Docker Compose Up (Produção)'

          # Health check em produção
          - script: |
              echo "Aguardando aplicação de produção inicializar..."
              sleep 30
              curl -f http://localhost:80/actuator/health || exit 1
              echo "✅ Produção está UP!"
            displayName: '❤️ Health Check Produção'
