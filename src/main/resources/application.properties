# ============================================================
# PowerTrack - Configs Principais
# ============================================================

spring.application.name=PowerTrack

# MongoDB - valor padrao (sobrescrito por variavel de ambiente no Docker)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/powertrack}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:powertrack}
spring.data.mongodb.auto-index-creation=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Info do projeto
info.app.name=PowerTrack
info.app.description=Monitoramento ESG de consumo energetico
info.app.version=1.0.0
info.app.environment=${APP_ENV:local}
