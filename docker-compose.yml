# ============================================================
# PowerTrack - Docker Compose
# Orquestra: App (Spring Boot) + MongoDB
# Ambientes: staging e produção via profiles
# ============================================================

version: '3.8'

services:

  # ─────────────────────────────
  # Banco de Dados - MongoDB
  # ─────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: powertrack-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-powertrack}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-powertrack123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-powertrack}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - powertrack-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────
  # Aplicação - PowerTrack
  # ─────────────────────────────
  powertrack-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powertrack-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE:-staging}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USERNAME:-powertrack}:${MONGO_PASSWORD:-powertrack123}@mongodb:27017/${MONGO_DATABASE:-powertrack}?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DATABASE:-powertrack}
      SPRING_DATA_MONGODB_AUTO_INDEX_CREATION: "true"
      APP_ENV: ${APP_PROFILE:-staging}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - powertrack-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ─────────────────────────────
# Volumes
# ─────────────────────────────
volumes:
  mongo-data:
    driver: local

# ─────────────────────────────
# Redes
# ─────────────────────────────
networks:
  powertrack-network:
    driver: bridge
